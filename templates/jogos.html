<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Ícone da aba do navegador (Favicon) -->
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='favicon.png.jpeg') }}?v=3">

    <!-- O restante das suas tags head continua aqui -->
</head>

    <!-- GOOGLE ANALYTICS AQUI -->
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SW3JKVWY80"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-SW3JKVWY80');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Games - Xbox 360</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>

    <!-- BARRA DE NAVEGAÇÃO (NAVBAR) -->
    <header class="navbar">
    <!-- 1. Clicar no logo também vai levar para o Início -->
    <a href="/" style="text-decoration: none; color: inherit;">
        <div class="logo">
            <span class="icon">🎮</span> PLANET <span class="green-text">GAMES</span>
        </div>
    </a>

    <nav class="nav-links">
        <!-- 2. O link Início agora aponta para a raiz do site -->
        <a href="/">Início</a>
        
        <a href="/produtos">Produto</a>
        <a href="/jogos">Jogos</a>
        <a href="#">Planos</a>
        <a href="#">FAQ</a>
    </nav>
</header>


    <!-- CONTEÚDO PRINCIPAL DOS JOGOS -->
    <main class="container-jogos">
        <h1 class="titulo-pagina">Todos os Jogos</h1>

        <!-- BARRA DE BUSCA -->
        <div class="busca-container">
            <input type="text" id="campoBusca" placeholder="Pesquise seu jogo...">
        </div>

        <!-- MENSAGEM DE NÃO ENCONTRADO -->
        <div id="mensagemNaoEncontrado" style="display: none; text-align: center; color: #94a3b8; margin-top: 20px; font-weight: bold;">
            Este jogo não foi encontrado em nosso site.
        </div>

        <!-- GRADE COM OS 5 BALÕES POR FILA -->
        <div class="grid-jogos">
            {% for jogo in jogos %}
                <div class="card-jogo">
                    <!-- FOTO DO JOGO -->
                    <div class="capa-box">
                        <img src="{{ url_for('static', filename=jogo.imagem) }}" alt="{{ jogo.titulo }}">
                    </div>

                    <!-- INFORMAÇÕES DO CARD -->
                    <div class="card-info">
                        <h3>{{ jogo.titulo }}</h3>
                        <span class="badge">{{ jogo.plataforma }}</span>
                        <p class="detalhes">Tamanho: {{ jogo.tamanho }}</p>

                        <!-- BOTÕES DE DOWNLOAD -->
                        <div class="botoes-container">
                            {% if jogo.link_part1 %}
                                <a href="{{ jogo.link_part1 }}" target="_blank" class="btn-comprar">Parte 1</a>
                                <a href="{{ jogo.link_part2 }}" target="_blank" class="btn-comprar">Parte 2</a>
                            {% else %}
                                <a href="{{ jogo.link }}" target="_blank" class="btn-comprar">Baixar Jogo</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </main>

    <!-- Seu arquivo JavaScript original que faz a busca funcionar -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
