<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos - Planet Games</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="icon">🎮</span> PLANET<span class="green-text">GAMES</span>
        </div>
        <nav class="nav-links">
            <a href="/">Início</a>
            <a href="/produtos">Produto</a>
            <a href="/jogos">Jogos</a>
            <a href="#">Planos</a>
            <a href="#">FAQ</a>
        </nav>
    </header>

    <main style="padding: 20px 8%;">
        <h2 class="titulo-pagina">Catálogo de Jogos Xbox 360</h2>

        <!-- BARRA DE PESQUISA -->
        <div class="busca-container">
            <input type="text" id="campoBusca" placeholder="🔍 Pesquisar jogo pelo nome..." onkeyup="filtrarJogos()">
        </div>

        <!-- MENSAGEM SE NÃO ENCONTRAR JOGO -->
        <div id="mensagemSemJogo" style="display: none; text-align: center; margin: 40px 0; color: #94a3b8; font-size: 1.2rem;">
            ⚠️ Nenhum jogo encontrado com esse nome.
        </div>

        <div class="grid-jogos" id="gridJogos">
            {% for jogo in jogos %}
            <div class="card-jogo">
                <div class="capa-box">
                    <img src="{{ url_for('static', filename=jogo.imagem) }}" alt="{{ jogo.titulo }}">
                </div>
                <div class="card-info">
                    <!-- A classe nome-jogo é essencial aqui -->
                    <h3 class="nome-jogo">{{ jogo.titulo }}</h3>
                    <span class="badge">{{ jogo.plataforma }}</span>
                    <p class="detalhes">💾 {{ jogo.tamanho }}</p>
                    <a href="{{ jogo.link }}" target="_blank" class="btn-comprar">Baixar / Comprar</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <!-- SCRIPT DE FILTRO + MENSAGEM -->
    <script>
        function filtrarJogos() {
            let input = document.getElementById('campoBusca').value.toLowerCase().trim();
            let cards = document.getElementsByClassName('card-jogo');
            let mensagem = document.getElementById('mensagemSemJogo');
            let jogosVisiveis = 0;

            for (let i = 0; i < cards.length; i++) {
                // Pega o texto do título do jogo
                let titulo = cards[i].querySelector('.nome-jogo').innerText.toLowerCase();
                
                if (titulo.includes(input)) {
                    cards[i].style.display = "flex";
                    jogosVisiveis++;
                } else {
                    cards[i].style.display = "none";
                }
            }

            // Exibe ou esconde a mensagem de "Jogo não encontrado"
            if (jogosVisiveis === 0) {
                mensagem.style.display = "block";
            } else {
                mensagem.style.display = "none";
            }
        }
    </script>

</body>
</html>
