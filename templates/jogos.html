<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos - Planet Games</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Header / Navbar mantendo o padrão do site -->
    <header class="navbar">
        <div class="logo">
            <span class="icon">🎮</span> PLANET<span class="green-text">GAMES</span>
        </div>
        <nav class="nav-links">
            <a href="/">Início</a>
            <a href="/produtos">Produto</a>
            <a href="/jogos">Jogos</a>
            <a href="#">Planos</a>
            <a href="#">FAQ</a>
        </nav>
    </header>

    <main class="container-jogos">
        <h2 class="titulo-secao">Catálogo de Jogos Xbox 360</h2>
        <!-- BARRA DE PESQUISA QUE ESTÁ FALTANDO -->
<div class="busca-container">
    <input type="text" id="campoBusca" placeholder="🔍 Pesquisar jogo pelo nome..." onkeyup="filtrarJogos()">
</div>
        <div class="grid-jogos">
            {% for jogo in jogos %}
            <div class="card-jogo">
                <div class="capa-box">
                    <img src="{{ url_for('static', filename=jogo.imagem) }}" alt="{{ jogo.titulo }}">
                </div>
                <div class="card-info">
                    <h3>{{ jogo.titulo }}</h3>
                    <span class="badge-plataforma">{{ jogo.plataforma }}</span>
                    <p class="tamanho-jogo">💾 {{ jogo.tamanho }}</p>
                    <a href="{{ jogo.link }}" target="_blank" class="btn-comprar-card">Baixar / Comprar</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
   <!-- SCRIPT DA PESQUISA -->
    <script>
        function filtrarJogos() {
            let input = document.getElementById('campoBusca').value.toLowerCase();
            let cards = document.getElementsByClassName('card-jogo');

            for (let i = 0; i < cards.length; i++) {
                let titulo = cards[i].querySelector('.nome-jogo').innerText.toLowerCase();
                
                if (titulo.includes(input)) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
