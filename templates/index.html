<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Games - Xbox 360</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="icon">🎮</span> PLANET<span class="green-text">GAMES</span>
        </div>
        <nav class="nav-links">
            <a href="#">Produto</a>
            <a href="#">Jogos</a>
            <a href="#">Planos</a>
            <a href="#">FAQ</a>
        </nav>
        <button class="btn-comprar">Comprar agora</button>
    </header>

    <main class="hero">
        <div class="hero-left">
            <div class="badge">● ESTOQUE LIMITADO</div>
            <h1>O clássico que <br><span class="glow-text">nunca envelhece.</span></h1>
            <p class="subtitle">
                Xbox 360 revisado, testado e pronto para jogar. Reviva GTA V, Halo, Forza e centenas de clássicos com a qualidade Planet Games.
            </p>
            <div class="hero-buttons">
                <button class="btn-verde btn-ofertas">Ver ofertas</button>
                <button class="btn-outline">Saiba mais</button>
            </div>
        </div>

        <div class="hero-right">
            <div class="image-container">
                <img src="fundo.jpg.png" alt="Xbox 360" class="xbox-img">
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
